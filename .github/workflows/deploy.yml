name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/getinvolved.bersamabisafoundation.org
            cd /var/www/getinvolved.bersamabisafoundation.org
            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/swanbo-com/bisahelpline-getinvolved.git .
            fi
