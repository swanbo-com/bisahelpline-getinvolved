name: Deploy Application

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.event.repository.name }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  APP_NAME: ${{ github.event.repository.name }}
  PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    name: Build, Push, & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate Required Secrets
        run: |
          if [ -z "${{ secrets.PROD_DOMAIN }}" ]; then
            echo "CRITICAL ERROR: Missing PROD_DOMAIN secret!"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_IP }}" ] || [ -z "${{ secrets.SERVER_USER }}" ] || [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "CRITICAL ERROR: Missing Server connection Secrets! Check SERVER_IP, SERVER_USER, and SSH_PRIVATE_KEY."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase IMAGE_NAME
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set Branch & Domain
        run: |
          echo "DOMAIN=${{ env.PROD_DOMAIN }}" >> $GITHUB_ENV
          echo "BRANCH=main" >> $GITHUB_ENV

      - name: Set up SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Setup Server Directory
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p /opt/apps/${{ env.APP_NAME }}"

      - name: Copy Deploy Files to Server
        run: |
          scp ./docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/apps/${{ env.APP_NAME }}/docker-compose.yml
          scp ./deploy.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/apps/${{ env.APP_NAME }}/deploy.sh

      - name: Execute Deploy Script on Server
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" > /tmp/ghcr_token
          scp /tmp/ghcr_token ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/apps/${{ env.APP_NAME }}/.ghcr_token
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "cat /opt/apps/${{ env.APP_NAME }}/.ghcr_token | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin && \
            rm -f /opt/apps/${{ env.APP_NAME }}/.ghcr_token && \
            cd /opt/apps/${{ env.APP_NAME }} && \
            chmod +x deploy.sh && \
            ./deploy.sh ${{ env.BRANCH }} ${{ env.DOMAIN }} ${{ env.APP_NAME }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          rm -f /tmp/ghcr_token
